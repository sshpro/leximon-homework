name: Test CI

on:
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend-changed: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

  run:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - run: exit 1

  leximon-homework-required:
    runs-on: ubuntu-latest
    if: always()
    needs: [run]
    steps:
      - name: Check results
        run: |
          echo '${{ toJSON(needs) }}' | jq -e '
            to_entries |
            map(select(.value.result != "success" and .value.result != "skipped")) |
            if length > 0 then
              .[0] | "Failed: " + .key + " (" + .value.result + ")" | halt_error(1)
            else
              "All jobs passed or were skipped"
            end
          '
